<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memolio Wallpaper (background only)</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background:
        linear-gradient(118deg, #090b10 0%, #10151d 34%, #1f1a25 66%, #12100f 100%);
    }

    /* Background-only wallpaper layer. Overlays (clock, date, wordmark, menu)
       are rendered by the app as Compose components, NOT baked into this art. */
    .wallpaper {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 900px;
      min-height: 560px;
      isolation: isolate;
      overflow: hidden;
      background:
        linear-gradient(148deg, rgba(255, 255, 255, 0.045), transparent 24%),
        linear-gradient(26deg, transparent 0 42%, rgba(91, 164, 154, 0.12) 47%, transparent 61%),
        linear-gradient(205deg, transparent 0 38%, rgba(166, 128, 98, 0.12) 46%, transparent 58%),
        linear-gradient(118deg, #07080c 0%, #10151c 31%, #221b27 67%, #100e0d 100%);
    }

    .wallpaper::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background-image:
        repeating-linear-gradient(
          112deg,
          rgba(255, 255, 255, 0.028) 0,
          rgba(255, 255, 255, 0.028) 1px,
          transparent 1px,
          transparent 152px
        );
      opacity: 0.55;
      transform: translateX(-2%);
    }

    .wallpaper::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.54), transparent 34%, rgba(0, 0, 0, 0.28)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.36), transparent 34%, rgba(0, 0, 0, 0.48));
    }

    .ambient-panel {
      position: absolute;
      right: -8vw;
      bottom: -16vh;
      width: 58vw;
      height: 64vh;
      transform: skewX(-12deg);
      border-left: 1px solid rgba(255, 255, 255, 0.07);
      background:
        linear-gradient(126deg, rgba(255, 255, 255, 0.06), transparent 32%),
        linear-gradient(216deg, rgba(88, 149, 143, 0.10), transparent 58%);
      filter: blur(0.2px);
      opacity: 0.58;
    }
  </style>
</head>
<body>
  <main class="wallpaper" aria-label="Memolio background wallpaper (no overlays)">
    <div class="ambient-panel" aria-hidden="true"></div>
  </main>
</body>
</html>
